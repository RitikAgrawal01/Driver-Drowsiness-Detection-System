global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 8s

rule_files:
  - "alert_rules.yml"

# ── Alertmanager (routes firing alerts to webhook server) ─────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "host.docker.internal:9095"   # webhook server running on host
      timeout: 10s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ddd_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "ddd_model_server"
    static_configs:
      - targets: ["model_server:8001"]
    metrics_path: /metrics
    scrape_interval: 10s
