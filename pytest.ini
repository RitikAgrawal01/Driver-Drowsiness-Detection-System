[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra test summary info for all except passed
addopts =
    -ra
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    unit: pure unit tests (no external dependencies)
    integration: integration tests (require running services)
    slow: tests that take more than 5 seconds

# Ignore these paths
norecursedirs =
    .git
    .dvc
    .venv
    node_modules
    __pycache__
    data
    models
    reports
    logs

# Asyncio mode for FastAPI async tests
asyncio_mode = auto
